<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>Mai & Binh's Fridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent-amber: #d4913a;
    --accent-terracotta: #b85c3a;
    --accent-clay: #c0704a;
    --accent-rust: #a04828;
    --accent-gold: #c8922e;
    --accent-blush: #d4897a;
    --accent-peach: #e8b89a;
    --text-primary: #3a2518;
    --text-muted: #9a7e6a;
  }

  html, body {
    width: 1024px;
    height: 600px;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: radial-gradient(ellipse at 20% 30%, #f9e4cc 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, #fde8d4 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, #f5ddc8 0%, transparent 60%),
                #fdf6ec;
  }

  /* ── Fixed decorative emojis ── */
  .deco {
    position: fixed;
    z-index: 0;
    opacity: 0.16;
    font-size: 32px;
  }

  .d1  { top: 6%;   left: 5%; }
  .d2  { top: 74%;  left: 10%; }
  .d3  { top: 12%;  right: 7%; }
  .d4  { bottom: 12%; right: 10%; }
  .d5  { top: 42%;  left: 2%; }
  .d6  { bottom: 6%; left: 35%; }
  .d7  { top: 6%;   left: 40%; }
  .d8  { top: 60%;  right: 3%; }
  .d9  { bottom: 18%; left: 20%; }
  .d10 { top: 30%;  right: 16%; }

  /* ── Main content card ── */
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 52px;
    padding: 48px 64px;
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid rgba(192, 112, 74, 0.15);
    border-radius: 28px;
    box-shadow: 0 4px 40px rgba(160, 72, 40, 0.08),
                0 1px 3px rgba(160, 72, 40, 0.06);
    animation: cardIn 1s ease-out forwards;
    opacity: 0;
    transform: translateY(16px);
  }

  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Left side: icon ── */
  .icon-side {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .fridge-emoji {
    font-size: 100px;
    display: block;
    animation: iconPop 0.8s 0.3s ease-out both;
  }

  @keyframes iconPop {
    0%   { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .fridge-emoji .pulse {
    display: inline-block;
    animation: iconBreathe 3s ease-in-out infinite;
  }

  @keyframes iconBreathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.06); }
  }

  .temp-display {
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--accent-terracotta);
    letter-spacing: 0.1em;
    opacity: 0;
    animation: fadeIn 0.6s 1.8s both;
  }

  /* ── Right side: text ── */
  .text-side {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .title-line {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 700;
    font-size: 74px;
    line-height: 1.05;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    white-space: nowrap;
  }

  .title-line .mai {
    display: inline-block;
    animation: nameSlide 0.8s 0.5s ease-out both;
    background: linear-gradient(135deg, var(--accent-rust), var(--accent-terracotta));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .title-line .amp {
    display: inline-block;
    animation: nameSlide 0.8s 0.65s ease-out both;
    font-style: italic;
    -webkit-text-fill-color: var(--text-muted);
    margin: 0 2px;
    font-size: 0.65em;
  }

  .title-line .binh {
    display: inline-block;
    animation: nameSlide 0.8s 0.8s ease-out both;
    background: linear-gradient(135deg, var(--accent-clay), var(--accent-amber));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .title-line .possessive {
    display: inline-block;
    animation: nameSlide 0.8s 0.9s ease-out both;
    -webkit-text-fill-color: var(--text-muted);
    font-size: 0.78em;
  }

  .title-line .fridge-word {
    display: inline-block;
    animation: nameSlide 0.8s 1s ease-out both;
    background: linear-gradient(135deg, var(--accent-gold), var(--accent-terracotta));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-left: 8px;
  }

  @keyframes nameSlide {
    0%   { transform: translateY(20px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  /* ── Divider ── */
  .divider {
    width: 100px;
    height: 3px;
    margin: 14px 0;
    background: linear-gradient(90deg, var(--accent-terracotta), var(--accent-peach), transparent);
    animation: fadeIn 0.8s 1.3s both;
    border-radius: 2px;
  }

  @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }

  /* ── Tagline ── */
  .tagline {
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    font-size: 18px;
    color: var(--text-muted);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    animation: fadeIn 0.8s 1.5s both;
  }

  /* ── Clock ── */
  .clock {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--text-primary);
    letter-spacing: 0.08em;
    animation: fadeIn 0.8s 1.8s both;
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid rgba(192, 112, 74, 0.12);
    padding: 10px 28px;
    border-radius: 999px;
    white-space: nowrap;
    box-shadow: 0 2px 12px rgba(160, 72, 40, 0.06);
  }

  /* ── Baby badge ── */
  .baby-badge {
    position: fixed;
    top: 20px;
    right: 26px;
    z-index: 3;
    font-family: 'Outfit', sans-serif;
    font-weight: 400;
    font-size: 14px;
    color: var(--accent-terracotta);
    letter-spacing: 0.06em;
    animation: fadeIn 0.8s 2s both;
    background: rgba(192, 112, 74, 0.1);
    border: 1px solid rgba(192, 112, 74, 0.15);
    padding: 8px 16px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 2px 8px rgba(160, 72, 40, 0.06);
  }

  .baby-badge .heart {
    display: inline-block;
    animation: heartbeat 1.5s ease-in-out infinite;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    15%      { transform: scale(1.2); }
    30%      { transform: scale(1); }
    45%      { transform: scale(1.15); }
  }
</style>
</head>
<body>

  <!-- Fixed decorative emojis -->
  <span class="deco d1">🥑</span>
  <span class="deco d2">🍓</span>
  <span class="deco d3">🧀</span>
  <span class="deco d4">🥕</span>
  <span class="deco d5">🍋</span>
  <span class="deco d6">🍇</span>
  <span class="deco d7">🥦</span>
  <span class="deco d8">🍊</span>
  <span class="deco d9">🍎</span>
  <span class="deco d10">🥚</span>

  <!-- Main content -->
  <div class="content">
    <div class="icon-side">
      <div class="fridge-emoji"><span class="pulse">🍽️</span></div>
      <div class="temp-display">37°F</div>
    </div>
    <div class="text-side">
      <div class="title-line">
        <span class="mai">Mai</span><span class="amp">&</span><span class="binh">Binh</span><span class="possessive">'s</span><span class="fridge-word">Fridge</span>
      </div>
      <div class="divider"></div>
      <div class="tagline">Always Fresh • Always Stocked</div>
    </div>
  </div>

  <!-- Baby badge -->
  <div class="baby-badge">
    <span class="heart">👶</span> Baby arriving July 2026
  </div>

  <!-- Clock -->
  <div class="clock" id="clock"></div>

  <script>
    function updateClock() {
      var now = new Date();
      var h = now.getHours();
      var m = now.getMinutes();
      var ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      m = m < 10 ? '0' + m : m;

      var days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
      var months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN',
                    'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];

      document.getElementById('clock').textContent =
        days[now.getDay()] + '  ' + months[now.getMonth()] + ' ' + now.getDate() +
        '  \u2022  ' + h + ':' + m + ' ' + ampm;
    }
    updateClock();
    setInterval(updateClock, 30000);
  </script>
</body>
</html>
