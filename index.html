<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>Mai & Binh's Baby Shower</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --brown-dark: #3e1f0d;
    --brown:      #5c3317;
    --brown-light:#8b5e3c;
    --cream:      #fdf8f0;
    --cream-dark: #f5ead6;
    --pink:       #f2a6b8;
    --pink-light: #fce4ec;
    --pink-stripe:#f8c8d8;
    --white:      #fffef9;
  }

  html, body {
    width: 1024px;
    height: 600px;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ── Awning strip at the very top ── */
  .awning {
    position: fixed;
    top: 0;
    left: 0;
    width: 1024px;
    z-index: 4;
  }

  .awning-stripes {
    height: 38px;
    background: repeating-linear-gradient(
      to right,
      var(--pink-stripe) 0px,  var(--pink-stripe) 32px,
      var(--white)       32px, var(--white)       64px
    );
  }

  .awning-scallops {
    height: 22px;
    background:
      radial-gradient(circle at 16px 0, var(--cream) 15px, var(--brown-dark) 15px)
      -16px 0 / 32px 22px repeat-x;
  }

  /* ── Faint background deco emojis ── */
  .deco {
    position: fixed;
    z-index: 0;
    opacity: 0.10;
    font-size: 28px;
  }

  .d1  { top: 18%;    left: 4%; }
  .d2  { top: 70%;    left: 8%; }
  .d3  { top: 15%;    right: 5%; }
  .d4  { bottom: 14%; right: 8%; }
  .d5  { top: 45%;    left: 1%; }
  .d6  { bottom: 10%; left: 34%; }
  .d7  { top: 18%;    left: 42%; }
  .d8  { top: 58%;    right: 2%; }
  .d9  { bottom: 20%; left: 18%; }
  .d10 { top: 48%;    right: 15%; }

  /* ── Main card ── */
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 48px;
    padding: 40px 56px;
    background: var(--white);
    border: 2px dashed rgba(242, 166, 184, 0.65);
    border-radius: 18px;
    box-shadow: 0 3px 20px rgba(62, 31, 13, 0.07),
                0 1px 4px  rgba(62, 31, 13, 0.04);
  }

  .icon-side {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 110px;
    height: 110px;
    background: var(--pink-light);
    border-radius: 16px;
    font-size: 64px;
    line-height: 1;
  }

  .text-side {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .script-label {
    font-family: 'Sacramento', cursive;
    font-size: 30px;
    color: var(--brown-light);
    line-height: 1.1;
    margin-bottom: 2px;
  }

  .title-line {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 700;
    font-size: 60px;
    line-height: 1.05;
    color: var(--brown-dark);
    letter-spacing: -0.02em;
    white-space: nowrap;
  }

  .divider {
    width: 100%;
    height: 2px;
    margin: 12px 0 10px;
    background: linear-gradient(90deg, var(--pink), var(--pink-stripe), transparent);
    border-radius: 2px;
  }

  .tagline {
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    font-size: 13px;
    color: var(--brown-light);
    letter-spacing: 0.28em;
    text-transform: uppercase;
  }

  /* ── Clock ── */
  .clock {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--brown);
    letter-spacing: 0.09em;
    background: var(--white);
    border: 1px solid rgba(242, 166, 184, 0.5);
    padding: 8px 22px;
    border-radius: 999px;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(62, 31, 13, 0.06);
  }
</style>
</head>
<body>

  <!-- Cafe-style awning at top -->
  <div class="awning">
    <div class="awning-stripes"></div>
    <div class="awning-scallops"></div>
  </div>

  <!-- Background deco -->
  <span class="deco d1">🍼</span>
  <span class="deco d2">👶</span>
  <span class="deco d3">🧸</span>
  <span class="deco d4">🎀</span>
  <span class="deco d5">🌙</span>
  <span class="deco d6">⭐</span>
  <span class="deco d7">🧷</span>
  <span class="deco d8">🎉</span>
  <span class="deco d9">💛</span>
  <span class="deco d10">🤍</span>

  <!-- Main card -->
  <div class="content">
    <div class="icon-side">🍼</div>
    <div class="text-side">
      <div class="script-label">a little bean is brewing!</div>
      <div class="title-line">Mai &amp; Binh's Baby Shower</div>
      <div class="divider"></div>
      <div class="tagline">Sip, Savor &amp; Shower &nbsp;—&nbsp; July 2026</div>
    </div>
  </div>

  <!-- Clock -->
  <div class="clock" id="clock"></div>

  <script>
    function updateClock() {
      var now = new Date();
      var h = now.getHours();
      var m = now.getMinutes();
      var ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      m = m < 10 ? '0' + m : m;
      var days   = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
      var months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
      document.getElementById('clock').textContent =
        days[now.getDay()] + '  ' + months[now.getMonth()] + ' ' + now.getDate() +
        '  •  ' + h + ':' + m + ' ' + ampm;
    }
    updateClock();
    setInterval(updateClock, 30000);
  </script>
</body>
</html>
