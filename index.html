<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>Mai & Binh's Baby Shower</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --brown-dark: #3e1f0d;
    --brown: #5c3317;
    --brown-light: #8b5e3c;
    --cream: #fdf8f0;
    --cream-dark: #f5ead6;
    --gold: #c49b63;
    --pink: #f2a6b8;
    --pink-light: #fce4ec;
    --white: #fffef9;
  }

  html, body {
    width: 1024px;
    height: 600px;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: radial-gradient(ellipse at 20% 30%, #f5ead6 0%, transparent 55%),
                radial-gradient(ellipse at 80% 70%, #fce4ec 0%, transparent 55%),
                #fdf8f0;
  }

  .deco {
    position: fixed;
    z-index: 0;
    opacity: 0.13;
    font-size: 30px;
  }

  .d1  { top: 6%;     left: 5%; }
  .d2  { top: 74%;    left: 10%; }
  .d3  { top: 12%;    right: 7%; }
  .d4  { bottom: 12%; right: 10%; }
  .d5  { top: 42%;    left: 2%; }
  .d6  { bottom: 6%;  left: 35%; }
  .d7  { top: 6%;     left: 40%; }
  .d8  { top: 60%;    right: 3%; }
  .d9  { bottom: 18%; left: 20%; }
  .d10 { top: 30%;    right: 16%; }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 52px;
    padding: 44px 60px;
    background: rgba(255, 254, 249, 0.78);
    border: 1px solid rgba(196, 155, 99, 0.28);
    border-radius: 22px;
    box-shadow: 0 4px 32px rgba(196, 155, 99, 0.14),
                0 1px 4px rgba(196, 155, 99, 0.08);
  }

  .icon-side {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .main-emoji {
    font-size: 96px;
    line-height: 1;
  }

  .text-side {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .script-label {
    font-family: 'Sacramento', cursive;
    font-size: 34px;
    color: var(--brown-light);
    line-height: 1;
    margin-bottom: 2px;
  }

  .title-line {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 700;
    font-size: 62px;
    line-height: 1.05;
    color: var(--brown-dark);
    letter-spacing: -0.02em;
    white-space: nowrap;
  }

  .title-line .name-mai {
    background: linear-gradient(135deg, #c49b63, #e8849a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .title-line .name-amp {
    font-style: italic;
    -webkit-text-fill-color: var(--brown-light);
    margin: 0 3px;
    font-size: 0.65em;
  }

  .title-line .name-binh {
    background: linear-gradient(135deg, #5c3317, #c49b63);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .title-line .name-possessive {
    -webkit-text-fill-color: var(--brown-light);
    font-size: 0.78em;
  }

  .title-line .shower-word {
    -webkit-text-fill-color: var(--brown-dark);
    margin-left: 8px;
  }

  .divider {
    width: 110px;
    height: 2px;
    margin: 14px 0 12px;
    background: linear-gradient(90deg, var(--gold), var(--pink), transparent);
    border-radius: 2px;
  }

  .tagline {
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    font-size: 14px;
    color: var(--brown-light);
    letter-spacing: 0.26em;
    text-transform: uppercase;
  }

  .clock {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--brown);
    letter-spacing: 0.08em;
    background: rgba(255, 254, 249, 0.9);
    border: 1px solid rgba(196, 155, 99, 0.22);
    padding: 9px 24px;
    border-radius: 999px;
    white-space: nowrap;
    box-shadow: 0 2px 10px rgba(196, 155, 99, 0.1);
  }
</style>
</head>
<body>

  <span class="deco d1">🍼</span>
  <span class="deco d2">👶</span>
  <span class="deco d3">🧸</span>
  <span class="deco d4">🎀</span>
  <span class="deco d5">🌙</span>
  <span class="deco d6">⭐</span>
  <span class="deco d7">🧷</span>
  <span class="deco d8">🎉</span>
  <span class="deco d9">💛</span>
  <span class="deco d10">🤍</span>

  <div class="content">
    <div class="icon-side">
      <div class="main-emoji">🍼</div>
    </div>
    <div class="text-side">
      <div class="script-label">Café Bébé</div>
      <div class="title-line">
        <span class="name-mai">Mai</span><span class="name-amp">&amp;</span><span class="name-binh">Binh</span><span class="name-possessive">'s</span><span class="shower-word"> Baby Shower</span>
      </div>
      <div class="divider"></div>
      <div class="tagline">A Little One Is On The Way</div>
    </div>
  </div>

  <div class="clock" id="clock"></div>

  <script>
    function updateClock() {
      var now = new Date();
      var h = now.getHours();
      var m = now.getMinutes();
      var ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      m = m < 10 ? '0' + m : m;
      var days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
      var months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
      document.getElementById('clock').textContent =
        days[now.getDay()] + '  ' + months[now.getMonth()] + ' ' + now.getDate() +
        '  •  ' + h + ':' + m + ' ' + ampm;
    }
    updateClock();
    setInterval(updateClock, 30000);
  </script>
</body>
</html>
